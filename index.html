<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电子物料BOM查错对比工具</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }

    header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 25px 0; text-align: center; }
    header h1 { font-size: 28px; margin-bottom: 8px; }
    header p { font-size: 14px; opacity: 0.85; }

    .main { max-width: 1400px; margin: 0 auto; padding: 25px; }

    /* 上传区 */
    .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
    .upload-box { background: white; border: 2px dashed #ccc; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative; }
    .upload-box:hover { border-color: #1a73e8; background: #f8faff; }
    .upload-box.loaded { border-color: #34a853; border-style: solid; background: #f0fff4; }
    .upload-icon { font-size: 48px; margin-bottom: 12px; }
    .upload-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 6px; }
    .upload-hint { font-size: 13px; color: #888; }
    .upload-info { font-size: 13px; color: #34a853; font-weight: bold; margin-top: 10px; }
    .upload-box input { display: none; }

    /* 配置区 */
    .config-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .config-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #333; }
    .config-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    .config-item { display: flex; align-items: center; gap: 8px; }
    .config-item label { font-size: 13px; color: #555; white-space: nowrap; }
    .config-item select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }

    /* 操作按钮 */
    .action-bar { text-align: center; margin-bottom: 25px; }
    .btn { padding: 14px 40px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
    .btn-primary { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(26,115,232,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-export { background: #34a853; color: white; margin-left: 15px; }
    .btn-export:hover { background: #2d9249; }

    /* 统计卡片 */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-number { font-size: 36px; font-weight: bold; }
    .stat-label { font-size: 13px; color: #666; margin-top: 5px; }
    .stat-card.added .stat-number { color: #34a853; }
    .stat-card.removed .stat-number { color: #ea4335; }
    .stat-card.modified .stat-number { color: #fbbc04; }
    .stat-card.same .stat-number { color: #1a73e8; }

    /* 结果表格 */
    .result-section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow-x: auto; }
    .result-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; }
    .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; cursor: pointer; background: white; transition: all 0.2s; }
    .filter-btn:hover { border-color: #1a73e8; }
    .filter-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8f9fa; padding: 10px 8px; text-align: left; border-bottom: 2px solid #e0e0e0; font-weight: bold; color: #333; white-space: nowrap; }
    td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
    tr:hover { background: #f8faff; }
    tr.row-added { background: #e6f4ea; }
    tr.row-removed { background: #fce8e6; }
    tr.row-modified { background: #fef7e0; }
    td.cell-changed { background: #fff3cd; font-weight: bold; color: #e65100; }
    .diff-old { text-decoration: line-through; color: #ea4335; font-size: 12px; }
    .diff-new { color: #34a853; font-weight: bold; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; color: white; }
    .badge-added { background: #34a853; }
    .badge-removed { background: #ea4335; }
    .badge-modified { background: #fbbc04; color: #333; }
    .badge-same { background: #e0e0e0; color: #666; }

    #resultSection { display: none; }
    #resultSection.show { display: block; }

    @media (max-width: 768px) {
      .upload-section { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ 电子物料BOM查错对比工具</h1>
    <p>上传两份BOM文件，自动对比差异，快速查错</p>
  </header>

  <div class="main">
    <!-- 上传区 -->
    <div class="upload-section">
      <div class="upload-box" id="uploadA" onclick="document.getElementById('fileA').click()">
        <div class="upload-icon">📄</div>
        <div class="upload-title">BOM A（基准版本）</div>
        <div class="upload-hint">点击上传 Excel 文件</div>
        <div class="upload-info" id="infoA"></div>
        <input type="file" id="fileA" accept=".xlsx,.xls,.csv">
      </div>
      <div class="upload-box" id="uploadB" onclick="document.getElementById('fileB').click()">
        <div class="upload-icon">📄</div>
        <div class="upload-title">BOM B（对比版本）</div>
        <div class="upload-hint">点击上传 Excel 文件</div>
        <div class="upload-info" id="infoB"></div>
        <input type="file" id="fileB" accept=".xlsx,.xls,.csv">
      </div>
    </div>

    <!-- 配置区 -->
    <div class="config-section">
      <div class="config-title">⚙️ 对比配置</div>
      <div class="config-row">
        <div class="config-item">
          <label>Sheet名称：</label>
          <select id="sheetSelect"><option value="auto">自动检测</option></select>
        </div>
        <div class="config-item">
          <label>匹配主键：</label>
          <select id="keySelect">
            <option value="型号">型号</option>
            <option value="位号">位号</option>
            <option value="物料编码">物料编码</option>
            <option value="物料名称">物料名称</option>
          </select>
        </div>
        <div class="config-item">
          <label>表头行号：</label>
          <select id="headerRow">
            <option value="auto">自动检测</option>
            <option value="0">第1行</option>
            <option value="1">第2行</option>
            <option value="2">第3行</option>
            <option value="3">第4行</option>
            <option value="4">第5行</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="action-bar">
      <button class="btn btn-primary" id="compareBtn" onclick="doCompare()" disabled>🔍 开始对比</button>
      <button class="btn btn-export" id="exportBtn" onclick="doExport()" style="display:none">📥 导出报告</button>
    </div>

    <!-- 结果区 -->
    <div id="resultSection">
      <div class="stats" id="statsCards"></div>
      <div class="result-section">
        <div class="result-title">📋 对比详情</div>
        <div class="filter-bar" id="filterBar"></div>
        <div style="overflow-x:auto;">
          <table id="resultTable"><thead></thead><tbody></tbody></table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== 全局状态 ==========
    let bomA = null, bomB = null;
    let compareResult = null;
    let currentFilter = 'all';

    // ========== 文件上传 ==========
    document.getElementById('fileA').addEventListener('change', e => handleFile(e, 'A'));
    document.getElementById('fileB').addEventListener('change', e => handleFile(e, 'B'));

    function handleFile(e, side) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (evt) => {
        const wb = XLSX.read(evt.target.result, { type: 'array' });
        const parsed = parseBOM(wb);

        if (side === 'A') {
          bomA = parsed;
          document.getElementById('uploadA').classList.add('loaded');
          document.getElementById('infoA').textContent = `✅ ${file.name}（${parsed.rows.length} 条物料）`;
        } else {
          bomB = parsed;
          document.getElementById('uploadB').classList.add('loaded');
          document.getElementById('infoB').textContent = `✅ ${file.name}（${parsed.rows.length} 条物料）`;
        }

        document.getElementById('compareBtn').disabled = !(bomA && bomB);
      };
      reader.readAsArrayBuffer(file);
    }

    // ========== 解析BOM ==========
    function parseBOM(wb) {
      // 优先找"单板BOM"sheet，否则用第一个
      let sheetName = wb.SheetNames.find(n => n.includes('BOM') || n.includes('bom')) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1 });

      // 自动检测表头行（找包含"序号"或"型号"或"物料"的行）
      let headerIdx = -1;
      for (let i = 0; i < Math.min(raw.length, 20); i++) {
        const row = (raw[i] || []).map(c => String(c || ''));
        if (row.some(c => c.includes('序号') || c.includes('型号') || c.includes('物料编码'))) {
          headerIdx = i;
          break;
        }
      }
      if (headerIdx === -1) headerIdx = 0;

      const headers = raw[headerIdx].map(h => String(h || '').trim());
      const rows = [];

      for (let i = headerIdx + 1; i < raw.length; i++) {
        const r = raw[i];
        if (!r || r.length === 0) continue;

        const obj = {};
        let hasData = false;
        headers.forEach((h, idx) => {
          const val = r[idx] !== undefined && r[idx] !== null ? String(r[idx]).trim() : '';
          if (h) obj[h] = val;
          if (val) hasData = true;
        });

        // 跳过空行和汇总行
        if (!hasData) continue;
        if (obj['物料名称'] && (obj['物料名称'].includes('合计') || obj['物料名称'].includes('总计'))) continue;

        rows.push(obj);
      }

      return { headers, rows, sheetName };
    }

    // ========== 对比逻辑 ==========
    function doCompare() {
      if (!bomA || !bomB) return;

      const keyField = document.getElementById('keySelect').value;
      const compareFields = ['物料编码', '物料名称', '型号', '参数描述', '位号', '数量', '单位', '封装', '品牌', '备注'];

      // 建立索引
      const mapA = new Map();
      const mapB = new Map();

      bomA.rows.forEach(r => {
        const key = r[keyField] || '';
        if (key) mapA.set(key, r);
      });

      bomB.rows.forEach(r => {
        const key = r[keyField] || '';
        if (key) mapB.set(key, r);
      });

      const results = [];

      // 查找修改和删除
      mapA.forEach((rowA, key) => {
        if (mapB.has(key)) {
          const rowB = mapB.get(key);
          const diffs = {};
          let hasDiff = false;

          compareFields.forEach(f => {
            const valA = (rowA[f] || '').trim();
            const valB = (rowB[f] || '').trim();
            if (valA !== valB) {
              diffs[f] = { old: valA, new: valB };
              hasDiff = true;
            }
          });

          results.push({
            status: hasDiff ? 'modified' : 'same',
            key,
            rowA,
            rowB,
            diffs
          });
        } else {
          results.push({ status: 'removed', key, rowA, rowB: null, diffs: {} });
        }
      });

      // 查找新增
      mapB.forEach((rowB, key) => {
        if (!mapA.has(key)) {
          results.push({ status: 'added', key, rowA: null, rowB, diffs: {} });
        }
      });

      // 排序：修改 > 新增 > 删除 > 相同
      const order = { modified: 0, added: 1, removed: 2, same: 3 };
      results.sort((a, b) => order[a.status] - order[b.status]);

      compareResult = { results, compareFields, keyField };
      renderResult();
    }

    // ========== 渲染结果 ==========
    function renderResult() {
      const { results, compareFields, keyField } = compareResult;

      // 统计
      const counts = { added: 0, removed: 0, modified: 0, same: 0 };
      results.forEach(r => counts[r.status]++);

      document.getElementById('statsCards').innerHTML = `
        <div class="stat-card modified"><div class="stat-number">${counts.modified}</div><div class="stat-label">🟡 修改</div></div>
        <div class="stat-card added"><div class="stat-number">${counts.added}</div><div class="stat-label">🟢 新增</div></div>
        <div class="stat-card removed"><div class="stat-number">${counts.removed}</div><div class="stat-label">🔴 删除</div></div>
        <div class="stat-card same"><div class="stat-number">${counts.same}</div><div class="stat-label">⚪ 相同</div></div>
      `;

      // 筛选按钮
      document.getElementById('filterBar').innerHTML = `
        <div class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">全部 (${results.length})</div>
        <div class="filter-btn ${currentFilter === 'modified' ? 'active' : ''}" onclick="setFilter('modified')">🟡 修改 (${counts.modified})</div>
        <div class="filter-btn ${currentFilter === 'added' ? 'active' : ''}" onclick="setFilter('added')">🟢 新增 (${counts.added})</div>
        <div class="filter-btn ${currentFilter === 'removed' ? 'active' : ''}" onclick="setFilter('removed')">🔴 删除 (${counts.removed})</div>
        <div class="filter-btn ${currentFilter === 'same' ? 'active' : ''}" onclick="setFilter('same')">⚪ 相同 (${counts.same})</div>
      `;

      // 表格
      const filtered = currentFilter === 'all' ? results : results.filter(r => r.status === currentFilter);
      const displayFields = [keyField, ...compareFields.filter(f => f !== keyField)];

      let thead = '<tr><th>状态</th>';
      displayFields.forEach(f => { thead += `<th>${f}</th>`; });
      thead += '</tr>';

      let tbody = '';
      filtered.forEach(item => {
        const rowClass = `row-${item.status}`;
        const statusMap = {
          added: '<span class="status-badge badge-added">新增</span>',
          removed: '<span class="status-badge badge-removed">删除</span>',
          modified: '<span class="status-badge badge-modified">修改</span>',
          same: '<span class="status-badge badge-same">相同</span>'
        };

        tbody += `<tr class="${rowClass}"><td>${statusMap[item.status]}</td>`;

        displayFields.forEach(f => {
          const row = item.rowB || item.rowA;
          if (item.status === 'modified' && item.diffs[f]) {
            tbody += `<td class="cell-changed"><span class="diff-old">${item.diffs[f].old || '(空)'}</span><br><span class="diff-new">${item.diffs[f].new || '(空)'}</span></td>`;
          } else {
            tbody += `<td>${row[f] || ''}</td>`;
          }
        });

        tbody += '</tr>';
      });

      document.querySelector('#resultTable thead').innerHTML = thead;
      document.querySelector('#resultTable tbody').innerHTML = tbody;

      document.getElementById('resultSection').classList.add('show');
      document.getElementById('exportBtn').style.display = 'inline-block';
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
    }

    function setFilter(filter) {
      currentFilter = filter;
      renderResult();
    }

    // ========== 导出报告 ==========
    function doExport() {
      if (!compareResult) return;

      const { results, compareFields, keyField } = compareResult;
      const displayFields = [keyField, ...compareFields.filter(f => f !== keyField)];

      const exportData = [];
      const statusMap = { added: '新增', removed: '删除', modified: '修改', same: '相同' };

      results.forEach(item => {
        const row = { '状态': statusMap[item.status] };
        const data = item.rowB || item.rowA;

        displayFields.forEach(f => {
          if (item.status === 'modified' && item.diffs[f]) {
            row[f + '(A)'] = item.diffs[f].old;
            row[f + '(B)'] = item.diffs[f].new;
          } else {
            row[f] = data[f] || '';
          }
        });

        exportData.push(row);
      });

      const ws = XLSX.utils.json_to_sheet(exportData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'BOM对比报告');
      XLSX.writeFile(wb, 'BOM对比报告.xlsx');
    }
  </script>
</body>
</html>
