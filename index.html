<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>BOM对比工具 v5.0</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
h1{text-align:center;color:#2563eb;margin-bottom:8px;font-size:28px}
.subtitle{text-align:center;color:#64748b;margin-bottom:24px;font-size:14px}
.upload-area{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.upload-card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:2px dashed #cbd5e1;transition:border-color .2s}
.upload-card:hover{border-color:#2563eb}
.upload-card h3{color:#2563eb;margin-bottom:12px}
.upload-btn{background:#2563eb;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;transition:background .2s}
.upload-btn:hover{background:#1d4ed8}
.file-info{margin-top:12px;font-size:13px;color:#475569;line-height:1.8}
.file-info .fname{font-weight:600;color:#1e293b}
.config-section{background:#fff;border-radius:12px;padding:20px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.config-section h3{color:#334155;margin-bottom:12px;font-size:16px}
.config-row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.config-row label{font-size:14px;color:#475569;cursor:pointer;display:flex;align-items:center;gap:4px}
.config-row select{padding:6px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-card .num{font-size:32px;font-weight:700}
.stat-card .label{font-size:13px;color:#64748b;margin-top:4px}
.stat-mod .num{color:#f59e0b}
.stat-del .num{color:#ef4444}
.stat-add .num{color:#22c55e}
.stat-same .num{color:#6b7280}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.toolbar button{padding:8px 16px;border:1px solid #e2e8f0;background:#fff;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s}
.toolbar button:hover{background:#f1f5f9}
.toolbar button.active{background:#2563eb;color:#fff;border-color:#2563eb}
.toolbar .export-btn{background:#059669;color:#fff;border-color:#059669}
.toolbar .export-btn:hover{background:#047857}
.toolbar .format-btn{background:#7c3aed;color:#fff;border-color:#7c3aed}
.toolbar .format-btn:hover{background:#6d28d9}
.table-wrap{overflow-x:auto;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;padding:10px 12px;text-align:left;border-bottom:2px solid #e2e8f0;white-space:nowrap;position:sticky;top:0}
td{padding:8px 12px;border-bottom:1px solid #f1f5f9;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:#f8fafc}
.status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500}
.badge-mod{background:#fef3c7;color:#92400e}
.badge-del{background:#fee2e2;color:#991b1b}
.badge-add{background:#dcfce7;color:#166534}
.badge-same{background:#f3f4f6;color:#4b5563}
.cell-diff{background:#fef9c3 !important;font-weight:600}
.detail-section{margin-top:24px}
.detail-section h3{margin-bottom:12px;color:#334155}
.detail-item{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);border-left:4px solid #f59e0b}
.detail-item .title{font-weight:600;margin-bottom:8px}
.detail-item .diff-line{font-size:13px;color:#475569;margin:4px 0}
.detail-item .val-a{color:#dc2626}
.detail-item .val-b{color:#16a34a}
.hidden{display:none}
@media(max-width:768px){.upload-area,.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>BOM 对比工具</h1>
<p class="subtitle">v5.1 · 纯前端处理 · 支持公司标准BOM与立创EDA导出BOM对比</p>

<div class="upload-area">
<div class="upload-card" id="cardA">
<h3>A - 公司标准BOM</h3>
<button class="upload-btn" onclick="pickFile('A')">选择文件</button>
<div class="file-info" id="infoA"></div>
</div>
<div class="upload-card" id="cardB">
<h3>B - 立创EDA导出BOM</h3>
<button class="upload-btn" onclick="pickFile('B')">选择文件</button>
<div class="file-info" id="infoB"></div>
</div>
</div>

<div class="config-section" id="configSection">
<h3>对比配置</h3>
<div class="config-row">
<label>匹配主键：<select id="matchKey"><option value="型号">型号</option><option value="位号">位号</option><option value="物料编码">物料编码</option></select></label>
<span style="color:#94a3b8">|</span>
<label>对比维度：</label>
<label><input type="checkbox" class="dim-chk" value="型号" checked> 型号</label>
<label><input type="checkbox" class="dim-chk" value="位号" checked> 位号</label>
<label><input type="checkbox" class="dim-chk" value="封装" checked> 封装</label>
<label><input type="checkbox" class="dim-chk" value="数量" checked> 数量</label>
<label><input type="checkbox" class="dim-chk" value="参数描述" checked> 参数描述</label>
<button class="upload-btn" style="margin-left:auto" onclick="runCompare()">开始对比</button>
</div>
</div>

<div id="resultArea" class="hidden">
<div class="stats" style="grid-template-columns:1fr 1fr">
<div class="stat-card stat-mod"><div class="num" id="numDiff">0</div><div class="label">🔴 有差异（变更+独有）</div></div>
<div class="stat-card stat-same"><div class="num" id="numSame">0</div><div class="label">🟢 一致</div></div>
</div>

<div class="toolbar">
<button class="active" onclick="filterTable('all',this)">全部</button>
<button onclick="filterTable('diff',this)">有差异</button>
<button onclick="filterTable('same',this)">一致</button>
<button class="export-btn" onclick="exportReport()">导出Excel报告</button>
<button class="format-btn" onclick="formatAs('A')">按A格式整理B</button>
<button class="format-btn" onclick="formatAs('B')">按B格式整理A</button>
</div>

<div class="table-wrap"><table id="resultTable"><thead></thead><tbody></tbody></table></div>
<div class="detail-section" id="detailSection"><h3>差异明细</h3><div id="detailList"></div></div>
</div>
</div>

<script>
const FIELD_ALIASES={
'型号':['型号','Comment型号','Comment','Value','规格型号','LibRef','Part'],
'位号':['位号','Designator位号','Designator','Reference','位置编号','Ref','RefDes'],
'封装':['封装','Footprint封装','Footprint','Package','封装规格','PCB Footprint'],
'数量':['数量','Quantity','QTY','用量','Count'],
'物料编码':['物料编码','MPN','料号','Part Number'],
'物料名称':['物料名称','Description','描述','名称'],
'参数描述':['参数描述','规格描述','详细描述','Specification'],
'品牌':['品牌','Brand','Manufacturer','厂商'],
'嘉立创编号':['嘉立创元件编号','LCSC','立创编号'],
'备注':['备注','Note','Remark','说明']
};
const KNOWN_FIELDS=['序号','物料编码','物料名称','型号','参数描述','位号','数量','单位','封装','品牌','备注','Comment型号','Designator位号','Footprint封装','嘉立创元件编号'];
const PKG_SUFFIXES=/\s+(SC0201|SC0402|SC0603|SC0805|SC1206|SR0201|SR0402|SR0603|SR0805|SR1206|SL0402|SL0603|SL0805|SL1206|SL1210)\s*$/i;
const A_COLS=['序号','物料编码','物料名称','型号','参数描述','位号','数量','单位','封装','品牌','备注'];

let dataA=null,dataB=null,compareResults=[];

function pickFile(side){
const inp=document.createElement('input');
inp.type='file';inp.accept='.xlsx,.xls,.csv';
inp.onchange=e=>{const f=e.target.files[0];if(f)readBOM(f,side)};
inp.click();
}

function readBOM(file,side){
const reader=new FileReader();
reader.onload=e=>{
const wb=XLSX.read(e.target.result,{type:'array'});
let sheetName=wb.SheetNames.find(n=>n.includes('BOM'))||wb.SheetNames[0];
const ws=wb.Sheets[sheetName];
const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
const parsed=parseSheet(raw);
if(side==='A'){dataA=parsed}else{dataB=parsed}
showInfo(side,file.name,parsed);
};
reader.readAsArrayBuffer(file);
}

function parseSheet(raw){
let headerRow=-1,headers=[];
// 精确匹配：扫描前30行
for(let i=0;i<Math.min(30,raw.length);i++){
const row=raw[i].map(c=>String(c).trim());
const exactCount=row.filter(c=>KNOWN_FIELDS.includes(c)).length;
if(exactCount>=3){headerRow=i;headers=row;break}
}
// 降级：包含匹配>=4
if(headerRow===-1){
for(let i=0;i<Math.min(30,raw.length);i++){
const row=raw[i].map(c=>String(c).trim());
let matchCount=0;
for(const cell of row){
for(const kf of KNOWN_FIELDS){if(cell===kf){matchCount++;break}}
}
if(matchCount>=4){headerRow=i;headers=row;break}
}
}
if(headerRow===-1){headerRow=0;headers=raw[0].map(c=>String(c).trim())}
// 字段映射
const fieldMap={};
for(const[std,aliases] of Object.entries(FIELD_ALIASES)){
for(let ci=0;ci<headers.length;ci++){
if(aliases.includes(headers[ci])){fieldMap[std]=ci;break}
}
}
// 解析数据行
const rows=[];
for(let i=headerRow+1;i<raw.length;i++){
const r=raw[i];
if(!r||r.every(c=>!c&&c!==0))continue;
const obj={};
for(const[std,ci] of Object.entries(fieldMap)){
obj[std]=String(r[ci]||'').trim();
}
// 如果没有数量但有位号，自动计算
if(!obj['数量']&&obj['位号']){
const des=obj['位号'].split(/[,，]/);
obj['数量']=String(des.filter(d=>d.trim()).length);
}
if(Object.values(obj).some(v=>v))rows.push(obj);
}
return{headers,headerRow,fieldMap,rows,rawHeaders:headers};
}

function showInfo(side,name,parsed){
const el=document.getElementById('info'+side);
const mapStr=Object.entries(parsed.fieldMap).map(([k,v])=>`${k}→列${v+1}(${parsed.headers[v]})`).join('、');
el.innerHTML=`<div class="fname">${name}</div>行数：${parsed.rows.length} | 表头行：${parsed.headerRow+1}<br>字段映射：${mapStr}`;
}

function normalize(val){
if(!val)return '';
return val.replace(PKG_SUFFIXES,'').trim().toLowerCase();
}

function runCompare(){
if(!dataA||!dataB){alert('请先上传A和B两个BOM文件');return}
const key=document.getElementById('matchKey').value;
const dims=[...document.querySelectorAll('.dim-chk:checked')].map(c=>c.value);
const aRows=dataA.rows,bRows=dataB.rows;
const results=[];
const bUsed=new Set();

for(let ai=0;ai<aRows.length;ai++){
const a=aRows[ai];
const aKey=a[key]||'';
if(!aKey)continue;
// 精确匹配
let matchIdx=bRows.findIndex((b,bi)=>!bUsed.has(bi)&&(b[key]||'')===aKey);
// 规范化匹配
if(matchIdx===-1){
const aNorm=normalize(aKey);
matchIdx=bRows.findIndex((b,bi)=>!bUsed.has(bi)&&normalize(b[key]||'')===aNorm);
}
if(matchIdx!==-1){
bUsed.add(matchIdx);
const b=bRows[matchIdx];
const diffs=[];
for(const d of dims){
const va=normalize(a[d]||''),vb=normalize(b[d]||'');
if(va!==vb)diffs.push({field:d,va:a[d]||'',vb:b[d]||''});
}
results.push({status:diffs.length?'mod':'same',a,b,diffs,key:aKey});
}else{
results.push({status:'del',a,b:null,diffs:[],key:aKey});
}
}
for(let bi=0;bi<bRows.length;bi++){
if(!bUsed.has(bi)){
const b=bRows[bi];
results.push({status:'add',a:null,b,diffs:[],key:b[key]||''});
}
}
compareResults=results;
renderResults(results,dims);
}

function renderResults(results,dims){
document.getElementById('resultArea').classList.remove('hidden');
const diffCount=results.filter(r=>r.status!=='same').length;
const same=results.filter(r=>r.status==='same').length;
document.getElementById('numDiff').textContent=diffCount;
document.getElementById('numSame').textContent=same;

if(!dims)dims=[...document.querySelectorAll('.dim-chk:checked')].map(c=>c.value);
const table=document.getElementById('resultTable');
let thHtml='<tr><th>状态</th><th>匹配键</th>';
for(const d of dims)thHtml+=`<th>${d}(A)</th><th>${d}(B)</th>`;
thHtml+='</tr>';
table.querySelector('thead').innerHTML=thHtml;

let tbHtml='';
for(const r of results){
const badge=`<span class="status-badge badge-${r.status}">${{mod:'差异',del:'A独有',add:'B独有',same:'一致'}[r.status]}</span>`;
tbHtml+=`<tr data-status="${r.status}"><td>${badge}</td><td>${r.key}</td>`;
const diffFields=new Set(r.diffs.map(d=>d.field));
for(const d of dims){
const va=r.a?r.a[d]||'':'-';
const vb=r.b?r.b[d]||'':'-';
const cls=diffFields.has(d)?'cell-diff':'';
tbHtml+=`<td class="${cls}">${va}</td><td class="${cls}">${vb}</td>`;
}
tbHtml+='</tr>';
}
table.querySelector('tbody').innerHTML=tbHtml;

// 差异明细（细分：字段变更 / A独有 / B独有）
const detailList=document.getElementById('detailList');
const diffItems=results.filter(r=>r.status!=='same');
if(!diffItems.length){detailList.innerHTML='<p style="color:#64748b">🎉 完全一致，无差异</p>';return}
let dHtml='';
const modItems=diffItems.filter(r=>r.status==='mod');
const delItems=diffItems.filter(r=>r.status==='del');
const addItems=diffItems.filter(r=>r.status==='add');
if(modItems.length){
dHtml+=`<h4 style="margin:12px 0 8px;color:#f59e0b">🟡 字段变更（${modItems.length}项）</h4>`;
for(const r of modItems){
dHtml+=`<div class="detail-item"><div class="title">${r.key}</div>`;
for(const d of r.diffs){
dHtml+=`<div class="diff-line">${d.field}：<span class="val-a">${d.va||'(空)'}</span> → <span class="val-b">${d.vb||'(空)'}</span></div>`;
}
dHtml+='</div>';
}
}
if(delItems.length){
dHtml+=`<h4 style="margin:12px 0 8px;color:#ef4444">🔴 A独有（${delItems.length}项）— B中不存在</h4>`;
for(const r of delItems){
dHtml+=`<div class="detail-item" style="border-left-color:#ef4444"><div class="title">${r.key}</div><div class="diff-line">A有此物料，B中未找到匹配</div></div>`;
}
}
if(addItems.length){
dHtml+=`<h4 style="margin:12px 0 8px;color:#22c55e">🟢 B独有（${addItems.length}项）— A中不存在</h4>`;
for(const r of addItems){
dHtml+=`<div class="detail-item" style="border-left-color:#22c55e"><div class="title">${r.key}</div><div class="diff-line">B有此物料，A中未找到匹配</div></div>`;
}
}
detailList.innerHTML=dHtml;
}

function filterTable(status,btn){
document.querySelectorAll('.toolbar button:not(.export-btn):not(.format-btn)').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
document.querySelectorAll('#resultTable tbody tr').forEach(tr=>{
if(status==='all')tr.style.display='';
else if(status==='diff')tr.style.display=(tr.dataset.status!=='same')?'':'none';
else tr.style.display=(tr.dataset.status===status)?'':'none';
});
}

function exportReport(){
if(!compareResults.length){alert('请先执行对比');return}
const dims=[...document.querySelectorAll('.dim-chk:checked')].map(c=>c.value);
const header=['状态','匹配键'];
for(const d of dims){header.push(d+'(A)');header.push(d+'(B)');}
const rows=[header];
for(const r of compareResults){
const row=[{mod:'差异',del:'A独有',add:'B独有',same:'一致'}[r.status],r.key];
for(const d of dims){row.push(r.a?r.a[d]||'':'');row.push(r.b?r.b[d]||'':'');}
rows.push(row);
}
const ws=XLSX.utils.aoa_to_sheet(rows);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,'对比报告');
XLSX.writeFile(wb,'BOM对比报告.xlsx');
}

function formatAs(target){
if(!dataA||!dataB){alert('请先上传A和B两个BOM文件');return}
if(target==='A'){
// 按A格式整理B
const cols=A_COLS;
const rows=[cols];
for(const b of dataB.rows){
const row=[];
for(const col of cols){
if(col==='序号'){row.push(rows.length)}
else if(col==='数量'){
const des=(b['位号']||'').split(/[,，]/).filter(d=>d.trim());
row.push(des.length||b['数量']||'');
}else{row.push(b[col]||'')}
}
rows.push(row);
}
const ws=XLSX.utils.aoa_to_sheet(rows);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,'BOM');
XLSX.writeFile(wb,'B按A格式整理.xlsx');
}else{
// 按B格式整理A
const bCols=['Comment型号','Designator位号','Footprint封装','嘉立创元件编号'];
const fieldToB={'型号':'Comment型号','位号':'Designator位号','封装':'Footprint封装','嘉立创编号':'嘉立创元件编号'};
const rows=[bCols];
for(const a of dataA.rows){
const row=[a['型号']||'',a['位号']||'',a['封装']||'',a['嘉立创编号']||''];
rows.push(row);
}
const ws=XLSX.utils.aoa_to_sheet(rows);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,'BOM');
XLSX.writeFile(wb,'A按B格式整理.xlsx');
}
}
</script>
</body>
</html>
