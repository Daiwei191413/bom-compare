<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电子物料BOM查错对比工具</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 25px 0; text-align: center; }
    header h1 { font-size: 28px; margin-bottom: 8px; }
    header p { font-size: 14px; opacity: 0.85; }
    .main { max-width: 1400px; margin: 0 auto; padding: 25px; }

    .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
    .upload-box { background: white; border: 2px dashed #ccc; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-box:hover { border-color: #1a73e8; background: #f8faff; }
    .upload-box.loaded { border-color: #34a853; border-style: solid; background: #f0fff4; }
    .upload-icon { font-size: 48px; margin-bottom: 12px; }
    .upload-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 6px; }
    .upload-hint { font-size: 13px; color: #888; }
    .upload-info { font-size: 13px; color: #34a853; font-weight: bold; margin-top: 10px; }
    .upload-box input { display: none; }
    .field-map { font-size: 12px; color: #666; margin-top: 8px; text-align: left; padding: 8px; background: #f8f9fa; border-radius: 6px; }
    .field-map div { margin: 2px 0; }

    .config-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .config-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #333; }
    .config-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    .config-item { display: flex; align-items: center; gap: 8px; }
    .config-item label { font-size: 13px; color: #555; white-space: nowrap; }
    .config-item select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .compare-fields { margin-top: 15px; }
    .compare-fields label { font-size: 13px; margin-right: 15px; }

    .action-bar { text-align: center; margin-bottom: 25px; }
    .btn { padding: 14px 40px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
    .btn-primary { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(26,115,232,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-export { background: #34a853; color: white; margin-left: 15px; }
    .btn-export:hover { background: #2d9249; }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-number { font-size: 36px; font-weight: bold; }
    .stat-label { font-size: 13px; color: #666; margin-top: 5px; }
    .stat-card.added .stat-number { color: #34a853; }
    .stat-card.removed .stat-number { color: #ea4335; }
    .stat-card.modified .stat-number { color: #fbbc04; }
    .stat-card.same .stat-number { color: #1a73e8; }

    .result-section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow-x: auto; }
    .result-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; }
    .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; cursor: pointer; background: white; transition: all 0.2s; }
    .filter-btn:hover { border-color: #1a73e8; }
    .filter-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8f9fa; padding: 10px 8px; text-align: left; border-bottom: 2px solid #e0e0e0; font-weight: bold; color: #333; white-space: nowrap; }
    td { padding: 8px; border-bottom: 1px solid #f0f0f0; max-width: 300px; word-break: break-all; }
    tr:hover { background: #f8faff; }
    tr.row-added { background: #e6f4ea; }
    tr.row-removed { background: #fce8e6; }
    tr.row-modified { background: #fef7e0; }
    td.cell-changed { background: #fff3cd; font-weight: bold; }
    .diff-old { text-decoration: line-through; color: #ea4335; font-size: 12px; display: block; }
    .diff-new { color: #34a853; font-weight: bold; display: block; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; color: white; }
    .badge-added { background: #34a853; }
    .badge-removed { background: #ea4335; }
    .badge-modified { background: #fbbc04; color: #333; }
    .badge-same { background: #e0e0e0; color: #666; }

    #resultSection { display: none; }
    #resultSection.show { display: block; }

    @media (max-width: 768px) {
      .upload-section { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ 电子物料BOM查错对比工具</h1>
    <p>支持不同格式BOM智能匹配对比（公司BOM vs 立创EDA导出）</p>
  </header>

  <div class="main">
    <div class="upload-section">
      <div class="upload-box" id="uploadA">
        <div class="upload-icon">📄</div>
        <div class="upload-title">BOM A（基准版本）</div>
        <div class="upload-hint">点击上传 Excel 文件（公司BOM / 立创BOM 均可）</div>
        <div class="upload-info" id="infoA"></div>
        <div class="field-map" id="fieldsA" style="display:none"></div>
        <input type="file" id="fileA" accept=".xlsx,.xls,.csv">
      </div>
      <div class="upload-box" id="uploadB">
        <div class="upload-icon">📄</div>
        <div class="upload-title">BOM B（对比版本）</div>
        <div class="upload-hint">点击上传 Excel 文件（公司BOM / 立创BOM 均可）</div>
        <div class="upload-info" id="infoB"></div>
        <div class="field-map" id="fieldsB" style="display:none"></div>
        <input type="file" id="fileB" accept=".xlsx,.xls,.csv">
      </div>
    </div>

    <div class="config-section">
      <div class="config-title">⚙️ 对比配置</div>
      <div class="config-row">
        <div class="config-item">
          <label>匹配主键：</label>
          <select id="keySelect">
            <option value="型号">型号</option>
            <option value="位号">位号</option>
          </select>
        </div>
      </div>
      <div class="compare-fields" style="margin-top:15px;">
        <div class="config-title" style="font-size:14px;">📋 对比维度（勾选要检查的字段）：</div>
        <label><input type="checkbox" class="cmp-field" value="型号" checked> 型号</label>
        <label><input type="checkbox" class="cmp-field" value="位号" checked> 位号</label>
        <label><input type="checkbox" class="cmp-field" value="封装" checked> 封装</label>
        <label><input type="checkbox" class="cmp-field" value="数量" checked> 数量</label>
        <label><input type="checkbox" class="cmp-field" value="参数描述" checked> 参数描述</label>
        <label><input type="checkbox" class="cmp-field" value="物料编码"> 物料编码</label>
        <label><input type="checkbox" class="cmp-field" value="物料名称"> 物料名称</label>
        <label><input type="checkbox" class="cmp-field" value="品牌"> 品牌</label>
        <label><input type="checkbox" class="cmp-field" value="备注"> 备注</label>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="compareBtn" onclick="doCompare()" disabled>🔍 开始对比</button>
      <button class="btn btn-export" id="exportBtn" onclick="doExport()" style="display:none">📥 导出报告</button>
    </div>

    <div id="resultSection">
      <div class="stats" id="statsCards"></div>
      <div class="result-section">
        <div class="result-title">📋 对比详情</div>
        <div class="filter-bar" id="filterBar"></div>
        <div style="overflow-x:auto;">
          <table id="resultTable"><thead></thead><tbody></tbody></table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let bomA = null, bomB = null;
    let compareResult = null;
    let currentFilter = 'all';

    // 字段名映射：统一不同BOM格式的列名
    const FIELD_ALIASES = {
      '型号': ['型号', 'Comment型号', 'Comment', 'Value', 'value', '规格型号'],
      '位号': ['位号', 'Designator位号', 'Designator', 'Reference', 'reference', '位置编号'],
      '封装': ['封装', 'Footprint封装', 'Footprint', 'Package', 'package', '封装规格'],
      '数量': ['数量', 'Quantity', 'quantity', 'QTY', 'qty', '用量'],
      '物料编码': ['物料编码', 'PartNumber', 'MPN', '料号'],
      '物料名称': ['物料名称', 'Description', 'description', '描述', '名称'],
      '参数描述': ['参数描述', '规格描述', '详细描述'],
      '单位': ['单位', 'Unit'],
      '品牌': ['品牌', 'Brand', 'Manufacturer', '厂商'],
      '备注': ['备注', 'Note', 'Remark', '说明']
    };

    // 上传事件
    document.getElementById('uploadA').addEventListener('click', function(e) {
      if (e.target.tagName !== 'INPUT') document.getElementById('fileA').click();
    });
    document.getElementById('uploadB').addEventListener('click', function(e) {
      if (e.target.tagName !== 'INPUT') document.getElementById('fileB').click();
    });
    document.getElementById('fileA').addEventListener('change', function(e) { handleFile(e, 'A'); });
    document.getElementById('fileB').addEventListener('change', function(e) { handleFile(e, 'B'); });

    function handleFile(e, side) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        const wb = XLSX.read(evt.target.result, { type: 'array' });
        const parsed = parseBOM(wb);

        if (side === 'A') {
          bomA = parsed;
          document.getElementById('uploadA').classList.add('loaded');
          document.getElementById('infoA').textContent = '✅ ' + file.name + '（' + parsed.rows.length + ' 条物料）';
          showFieldMap('fieldsA', parsed);
        } else {
          bomB = parsed;
          document.getElementById('uploadB').classList.add('loaded');
          document.getElementById('infoB').textContent = '✅ ' + file.name + '（' + parsed.rows.length + ' 条物料）';
          showFieldMap('fieldsB', parsed);
        }
        document.getElementById('compareBtn').disabled = !(bomA && bomB);
      };
      reader.readAsArrayBuffer(file);
    }

    function showFieldMap(elId, parsed) {
      var el = document.getElementById(elId);
      var html = '<div><b>识别到的字段映射：</b></div>';
      for (var std in parsed.fieldMap) {
        html += '<div>' + std + ' ← ' + parsed.fieldMap[std] + '</div>';
      }
      el.innerHTML = html;
      el.style.display = 'block';
    }

    // 解析BOM，自动识别格式
    function parseBOM(wb) {
      var sheetName = wb.SheetNames.find(function(n) { return n.includes('BOM') || n.includes('bom'); }) || wb.SheetNames[0];
      var ws = wb.Sheets[sheetName];
      var raw = XLSX.utils.sheet_to_json(ws, { header: 1 });

      // 自动检测表头行
      var headerIdx = -1;
      for (var i = 0; i < Math.min(raw.length, 20); i++) {
        var row = (raw[i] || []).map(function(c) { return String(c || ''); });
        // 检查是否包含已知字段名
        var matchCount = 0;
        for (var std in FIELD_ALIASES) {
          var aliases = FIELD_ALIASES[std];
          for (var a = 0; a < aliases.length; a++) {
            if (row.some(function(c) { return c.includes(aliases[a]); })) {
              matchCount++;
              break;
            }
          }
        }
        if (matchCount >= 2) { headerIdx = i; break; }
      }
      if (headerIdx === -1) headerIdx = 0;

      var headers = raw[headerIdx].map(function(h) { return String(h || '').trim(); });

      // 建立字段映射
      var fieldMap = {};
      for (var std in FIELD_ALIASES) {
        var aliases = FIELD_ALIASES[std];
        for (var a = 0; a < aliases.length; a++) {
          var found = headers.find(function(h) { return h.includes(aliases[a]); });
          if (found) { fieldMap[std] = found; break; }
        }
      }

      // 解析数据行，统一字段名
      var rows = [];
      for (var i = headerIdx + 1; i < raw.length; i++) {
        var r = raw[i];
        if (!r || r.length === 0) continue;

        var obj = {};
        var hasData = false;
        headers.forEach(function(h, idx) {
          var val = (r[idx] !== undefined && r[idx] !== null) ? String(r[idx]).trim() : '';
          if (h) obj[h] = val;
          if (val) hasData = true;
        });
        if (!hasData) continue;

        // 统一字段名
        var unified = {};
        for (var std in fieldMap) {
          unified[std] = obj[fieldMap[std]] || '';
        }

        // 自动计算数量（从位号数逗号）
        if (!unified['数量'] && unified['位号']) {
          unified['数量'] = String(unified['位号'].split(',').length);
        }

        if (unified['型号'] || unified['位号']) {
          rows.push(unified);
        }
      }

      return { headers: headers, rows: rows, sheetName: sheetName, fieldMap: fieldMap };
    }

    // 对比逻辑
    function doCompare() {
      if (!bomA || !bomB) return;

      var keyField = document.getElementById('keySelect').value;

      // 获取勾选的对比字段
      var cmpFields = [];
      document.querySelectorAll('.cmp-field:checked').forEach(function(cb) {
        cmpFields.push(cb.value);
      });

      var mapA = new Map();
      var mapB = new Map();

      bomA.rows.forEach(function(r) {
        var key = (r[keyField] || '').trim();
        if (key) mapA.set(key, r);
      });
      bomB.rows.forEach(function(r) {
        var key = (r[keyField] || '').trim();
        if (key) mapB.set(key, r);
      });

      var results = [];

      mapA.forEach(function(rowA, key) {
        if (mapB.has(key)) {
          var rowB = mapB.get(key);
          var diffs = {};
          var hasDiff = false;

          cmpFields.forEach(function(f) {
            var valA = (rowA[f] || '').trim();
            var valB = (rowB[f] || '').trim();
            if (valA !== valB) {
              diffs[f] = { old: valA, new: valB };
              hasDiff = true;
            }
          });

          results.push({ status: hasDiff ? 'modified' : 'same', key: key, rowA: rowA, rowB: rowB, diffs: diffs });
        } else {
          results.push({ status: 'removed', key: key, rowA: rowA, rowB: null, diffs: {} });
        }
      });

      mapB.forEach(function(rowB, key) {
        if (!mapA.has(key)) {
          results.push({ status: 'added', key: key, rowA: null, rowB: rowB, diffs: {} });
        }
      });

      var order = { modified: 0, added: 1, removed: 2, same: 3 };
      results.sort(function(a, b) { return order[a.status] - order[b.status]; });

      compareResult = { results: results, cmpFields: cmpFields, keyField: keyField };
      renderResult();
    }

    function renderResult() {
      var results = compareResult.results;
      var cmpFields = compareResult.cmpFields;
      var keyField = compareResult.keyField;

      var counts = { added: 0, removed: 0, modified: 0, same: 0 };
      results.forEach(function(r) { counts[r.status]++; });

      document.getElementById('statsCards').innerHTML =
        '<div class="stat-card modified"><div class="stat-number">' + counts.modified + '</div><div class="stat-label">🟡 有差异</div></div>' +
        '<div class="stat-card added"><div class="stat-number">' + counts.added + '</div><div class="stat-label">🟢 B独有</div></div>' +
        '<div class="stat-card removed"><div class="stat-number">' + counts.removed + '</div><div class="stat-label">🔴 A独有</div></div>' +
        '<div class="stat-card same"><div class="stat-number">' + counts.same + '</div><div class="stat-label">⚪ 一致</div></div>';

      var filterHtml =
        '<div class="filter-btn ' + (currentFilter === 'all' ? 'active' : '') + '" onclick="setFilter(\'all\')">全部 (' + results.length + ')</div>' +
        '<div class="filter-btn ' + (currentFilter === 'modified' ? 'active' : '') + '" onclick="setFilter(\'modified\')">🟡 有差异 (' + counts.modified + ')</div>' +
        '<div class="filter-btn ' + (currentFilter === 'added' ? 'active' : '') + '" onclick="setFilter(\'added\')">🟢 B独有 (' + counts.added + ')</div>' +
        '<div class="filter-btn ' + (currentFilter === 'removed' ? 'active' : '') + '" onclick="setFilter(\'removed\')">🔴 A独有 (' + counts.removed + ')</div>' +
        '<div class="filter-btn ' + (currentFilter === 'same' ? 'active' : '') + '" onclick="setFilter(\'same\')">⚪ 一致 (' + counts.same + ')</div>';
      document.getElementById('filterBar').innerHTML = filterHtml;

      var filtered = currentFilter === 'all' ? results : results.filter(function(r) { return r.status === currentFilter; });
      var displayFields = [keyField];
      cmpFields.forEach(function(f) { if (f !== keyField) displayFields.push(f); });

      var thead = '<tr><th>状态</th>';
      displayFields.forEach(function(f) { thead += '<th>' + f + '(A)</th><th>' + f + '(B)</th>'; });
      thead += '</tr>';

      var tbody = '';
      filtered.forEach(function(item) {
        tbody += '<tr class="row-' + item.status + '">';
        var statusMap = { added: '<span class="status-badge badge-added">B独有</span>', removed: '<span class="status-badge badge-removed">A独有</span>', modified: '<span class="status-badge badge-modified">有差异</span>', same: '<span class="status-badge badge-same">一致</span>' };
        tbody += '<td>' + statusMap[item.status] + '</td>';

        displayFields.forEach(function(f) {
          var valA = item.rowA ? (item.rowA[f] || '') : '';
          var valB = item.rowB ? (item.rowB[f] || '') : '';
          var changed = item.diffs[f] ? ' class="cell-changed"' : '';
          tbody += '<td' + changed + '>' + valA + '</td>';
          tbody += '<td' + changed + '>' + valB + '</td>';
        });
        tbody += '</tr>';
      });

      document.querySelector('#resultTable thead').innerHTML = thead;
      document.querySelector('#resultTable tbody').innerHTML = tbody;
      document.getElementById('resultSection').classList.add('show');
      document.getElementById('exportBtn').style.display = 'inline-block';
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
    }

    function setFilter(filter) { currentFilter = filter; renderResult(); }

    function doExport() {
      if (!compareResult) return;
      var results = compareResult.results;
      var cmpFields = compareResult.cmpFields;
      var keyField = compareResult.keyField;
      var displayFields = [keyField];
      cmpFields.forEach(function(f) { if (f !== keyField) displayFields.push(f); });

      var statusMap = { added: 'B独有', removed: 'A独有', modified: '有差异', same: '一致' };
      var exportData = [];

      results.forEach(function(item) {
        var row = { '状态': statusMap[item.status] };
        displayFields.forEach(function(f) {
          row[f + '(A)'] = item.rowA ? (item.rowA[f] || '') : '';
          row[f + '(B)'] = item.rowB ? (item.rowB[f] || '') : '';
        });
        exportData.push(row);
      });

      var ws = XLSX.utils.json_to_sheet(exportData);
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'BOM对比报告');
      XLSX.writeFile(wb, 'BOM对比报告.xlsx');
    }
  </script>
</body>
</html>
